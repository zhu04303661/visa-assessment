# ============================================================
# Nginx 配置 - xichigroup.com.cn
# ============================================================
# 部署步骤:
#   1. 替换 __DOMAIN__ 为实际域名
#   2. 替换 __GATEWAY_TOKEN__ 为 openclaw gateway token
#   3. 复制到 /etc/nginx/sites-enabled/__DOMAIN__
#   4. 配置 SSL 证书 (certbot --nginx -d __DOMAIN__)
#   5. sudo nginx -t && sudo nginx -s reload
# ============================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name __DOMAIN__;

    client_max_body_size 50M;

    # ----------------------------------------------------------
    # OpenClaw Dashboard 入口
    # 访问 /openclaw/ 时注入 token 并跳转到 chat 页面
    # ----------------------------------------------------------
    location = /openclaw/ {
        default_type text/html;
        return 200 '<html><head><script>if(!location.hash||!location.hash.includes("token=")){location.hash="token=__GATEWAY_TOKEN__";location.reload();}else{window.location.replace("/openclaw/chat?session=main"+location.hash);}</script></head><body>Redirecting...</body></html>';
    }

    # ----------------------------------------------------------
    # OpenClaw WebSocket（无尾部斜杠）
    # Dashboard JS 构造 WebSocket URL 为 wss://domain/openclaw
    # 必须精确匹配，否则 Nginx 会 301 → WebSocket 握手失败
    # ----------------------------------------------------------
    location = /openclaw {
        proxy_pass http://127.0.0.1:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ----------------------------------------------------------
    # OpenClaw Dashboard 页面 + WebSocket（子路径）
    # 关键：
    #   proxy_hide_header Content-Security-Policy — Dashboard 自带
    #     CSP "script-src 'self'" 会阻止 sub_filter 注入的 inline
    #     script，导致 token 无法写入 location.hash，WebSocket 认证
    #     失败 (device identity required → 1006)
    #   sub_filter — 在 HTML </head> 前注入 JS，自动设置 token
    #   Accept-Encoding "" — 防止压缩响应，确保 sub_filter 生效
    # ----------------------------------------------------------
    location /openclaw/ {
        proxy_pass http://127.0.0.1:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        proxy_hide_header Content-Security-Policy;

        sub_filter '</head>' '<script>if(!location.hash||!location.hash.includes("token=")){location.hash="token=__GATEWAY_TOKEN__";}</script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }

    # ----------------------------------------------------------
    # OpenClaw WebSocket（visa-assessment chat 页面使用）
    # ----------------------------------------------------------
    location /ws/openclaw {
        proxy_pass http://127.0.0.1:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ----------------------------------------------------------
    # Next.js 前端
    # ----------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # SSL 配置（由 certbot 自动管理，首次部署后生成）
    # listen [::]:443 ssl ipv6only=on;
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

